services:
  - type: web
    name: titanic-chat-agent-api
    runtime: python
    rootDir: titanic-chatbot/backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
